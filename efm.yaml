version: 1
root-markers:
    - ".git"
    - ".svn"
log-level: 2
lint-debounce: "500ms"

tools:
  codespell: &codespell
    root-markers:
      - ./dictionary.txt
    lint-command: 'codespell -D ./dictionary.txt ${INPUT}'
    lint-formats:
      - '%f:%l: %m'
    format-command: 'codespell -F ./dictionary.txt ${INPUT} --tee /dev/null'

  cppcheck-lint: &cppcheck-lint
    lint-command: 'cppcheck --quiet --force --enable=style --error-exitcode=1 ${INPUT}'
    lint-stdin: false
    lint-formats:
      - '%f:%l:%c %m'

  flake8: &flake8
    lint-command: "flake8 ${INPUT}"
    lint-debounce: "500ms"

  black: &black
    format-command: "black --quiet -"
    format-stdin: true

  eslint: &eslint
    lint-command: "eslint ${INPUT}"

  prettier: &prettier
    format-command: "prettier --write ${INPUT}"

  tslint: &tslint
    lint-command: "tslint --project tsconfig.json ${INPUT}"

  luacheck: &luacheck
    lint-command: "luacheck ${INPUT}"
    lint-stdin: false
    lint-formats:
      - '%f:%l:%c %m'

  stylelint: &stylelint
    lint-command: "stylelint ${INPUT}"

  htmlhint: &htmlhint
    lint-command: "htmlhint --format=json ${INPUT}"

  sh-shellcheck: &sh-shellcheck
    lint-command: 'shellcheck -f gcc -x ${INPUT}'
    lint-source: 'shellcheck'
    lint-formats:
      - '%f:%l:%c: %trror: %m'
      - '%f:%l:%c: %tarning: %m'
      - '%f:%l:%c: %tote: %m'
  sh-shfmt: &sh-shfmt
    format-command: 'shfmt -ci -s -bn'
    format-stdin: true

languages:
  c:
    - <<: *cppcheck-lint
  cpp:
    - <<: *cppcheck-lint

  sh:
    - <<: *sh-shfmt
    - <<: *sh-shellcheck

  python:
    - <<: *flake8
    - <<: *black

  javascript:
    - <<: *eslint
    - <<: *prettier

  typescript:
    - <<: *tslint
    - <<: *prettier

  lua:
    - <<: *luacheck

  css:
    - <<: *stylelint
    - <<: *prettier

  json:
    - <<: *prettier

  html:
    - <<: *htmlhint
    - <<: *prettier

  =:
    - <<: *codespell

# You can add more languages and tools here as needed.
